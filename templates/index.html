<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>논문 서포팅 봇</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f1f5f9;
      --surface: #ffffff;
      --primary: #2563eb;
      --primary-dark: #1d4ed8;
      --user-bubble: #2563eb;
      --user-text: #ffffff;
      --bot-bubble: #ffffff;
      --bot-text: #1e293b;
      --tool-bg: #f8fafc;
      --tool-border: #e2e8f0;
      --tool-text: #64748b;
      --thinking-bg: #eff6ff;
      --thinking-text: #3b82f6;
      --muted: #94a3b8;
      --header-bg: #ffffff;
      --input-bg: #ffffff;
      --input-border: #e2e8f0;
      --shadow: 0 1px 3px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.04);
      --shadow-lg: 0 4px 6px rgba(0,0,0,.07), 0 2px 4px rgba(0,0,0,.05);
      --radius: 18px;
      --radius-sm: 10px;
      --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    }

    html, body {
      height: 100%;
      font-family: var(--font);
      background: var(--bg);
      color: var(--bot-text);
      -webkit-text-size-adjust: 100%;
    }

    #app {
      display: flex;
      flex-direction: column;
      height: 100%;
      height: 100dvh;
      max-width: 800px;
      margin: 0 auto;
    }

    /* Header */
    header {
      background: var(--header-bg);
      border-bottom: 1px solid var(--tool-border);
      padding: 12px 16px;
      padding-top: max(12px, env(safe-area-inset-top));
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
      box-shadow: var(--shadow);
    }

    .header-title {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .header-icon {
      width: 36px;
      height: 36px;
      background: var(--primary);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
    }

    .header-text h1 {
      font-size: 16px;
      font-weight: 700;
      color: #0f172a;
      line-height: 1.2;
    }

    .header-text p {
      font-size: 12px;
      color: var(--muted);
      margin-top: 1px;
    }

    .btn-new {
      background: none;
      border: 1.5px solid var(--input-border);
      border-radius: 8px;
      padding: 7px 13px;
      font-size: 13px;
      font-weight: 500;
      color: #475569;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: background .15s;
    }
    .btn-new:active { background: #f1f5f9; }

    /* Messages */
    #messages {
      flex: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    /* Welcome */
    .welcome {
      text-align: center;
      padding: 32px 16px;
      color: var(--muted);
    }
    .welcome-icon { font-size: 48px; margin-bottom: 12px; }
    .welcome h2 { font-size: 18px; font-weight: 600; color: #475569; margin-bottom: 6px; }
    .welcome p { font-size: 14px; line-height: 1.6; }

    .suggestions {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-top: 20px;
      text-align: left;
    }

    .suggestion-btn {
      background: var(--surface);
      border: 1.5px solid var(--input-border);
      border-radius: 12px;
      padding: 12px 14px;
      font-size: 13px;
      color: #334155;
      cursor: pointer;
      text-align: left;
      line-height: 1.4;
      -webkit-tap-highlight-color: transparent;
      transition: border-color .15s, background .15s;
    }
    .suggestion-btn:active { background: #f8fafc; border-color: var(--primary); }

    /* Message bubbles */
    .msg {
      display: flex;
      flex-direction: column;
      max-width: 88%;
      animation: fadeUp .2s ease;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .msg.user { align-self: flex-end; align-items: flex-end; }
    .msg.bot { align-self: flex-start; align-items: flex-start; }

    .bubble {
      padding: 11px 15px;
      border-radius: var(--radius);
      font-size: 15px;
      line-height: 1.6;
      word-break: break-word;
      white-space: pre-wrap;
    }

    .msg.user .bubble {
      background: var(--user-bubble);
      color: var(--user-text);
      border-bottom-right-radius: 5px;
      box-shadow: var(--shadow);
    }

    .msg.bot .bubble {
      background: var(--bot-bubble);
      color: var(--bot-text);
      border-bottom-left-radius: 5px;
      box-shadow: var(--shadow);
    }

    .msg-time {
      font-size: 11px;
      color: var(--muted);
      margin-top: 4px;
      padding: 0 4px;
    }

    /* Tool call indicator */
    .tool-call {
      background: var(--tool-bg);
      border: 1px solid var(--tool-border);
      border-radius: var(--radius-sm);
      font-size: 12px;
      color: var(--tool-text);
      overflow: hidden;
      align-self: flex-start;
      max-width: 88%;
      margin-bottom: 2px;
    }

    .tool-summary {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 8px 12px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    .tool-icon { font-size: 14px; }
    .tool-name { font-weight: 600; color: #475569; }
    .tool-status {
      margin-left: auto;
      font-size: 11px;
      padding: 2px 7px;
      border-radius: 99px;
    }
    .tool-status.running { background: #dbeafe; color: #1d4ed8; }
    .tool-status.ok { background: #dcfce7; color: #15803d; }
    .tool-status.error { background: #fee2e2; color: #b91c1c; }

    .tool-args {
      padding: 0 12px 8px;
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: 11px;
      color: #64748b;
      display: none;
    }
    .tool-call.open .tool-args { display: block; }

    /* Thinking indicator */
    .thinking {
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--thinking-bg);
      color: var(--thinking-text);
      border-radius: var(--radius-sm);
      padding: 9px 13px;
      font-size: 13px;
      font-weight: 500;
      align-self: flex-start;
    }

    .dots {
      display: flex;
      gap: 4px;
    }
    .dot {
      width: 6px;
      height: 6px;
      background: var(--thinking-text);
      border-radius: 50%;
      animation: bounce .9s infinite;
    }
    .dot:nth-child(2) { animation-delay: .15s; }
    .dot:nth-child(3) { animation-delay: .3s; }
    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-5px); }
    }

    /* Input area */
    #input-area {
      background: var(--input-bg);
      border-top: 1px solid var(--tool-border);
      padding: 12px 16px;
      padding-bottom: max(12px, env(safe-area-inset-bottom));
      flex-shrink: 0;
    }

    .input-row {
      display: flex;
      align-items: flex-end;
      gap: 10px;
    }

    #user-input {
      flex: 1;
      background: var(--bg);
      border: 1.5px solid var(--input-border);
      border-radius: 14px;
      padding: 10px 14px;
      font-size: 15px;
      font-family: var(--font);
      line-height: 1.5;
      resize: none;
      outline: none;
      max-height: 140px;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      color: var(--bot-text);
      transition: border-color .15s;
    }
    #user-input:focus { border-color: var(--primary); }
    #user-input::placeholder { color: var(--muted); }

    #send-btn {
      width: 42px;
      height: 42px;
      background: var(--primary);
      border: none;
      border-radius: 12px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      -webkit-tap-highlight-color: transparent;
      transition: background .15s, transform .1s;
    }
    #send-btn:active { background: var(--primary-dark); transform: scale(.95); }
    #send-btn:disabled { background: var(--muted); cursor: not-allowed; transform: none; }

    #send-btn svg { pointer-events: none; }

    /* Copy button for bot messages */
    .copy-btn {
      background: none;
      border: none;
      font-size: 11px;
      color: var(--muted);
      cursor: pointer;
      padding: 2px 6px;
      border-radius: 5px;
      margin-top: 2px;
      -webkit-tap-highlight-color: transparent;
    }
    .copy-btn:active { color: #334155; background: #f1f5f9; }
  </style>
</head>
<body>
<div id="app">
  <header>
    <div class="header-title">
      <div class="header-icon">📚</div>
      <div class="header-text">
        <h1>논문 서포팅 봇</h1>
        <p>학술 검색 · 인용 검증 · 초안 작성</p>
      </div>
    </div>
    <button class="btn-new" id="new-btn">새 대화</button>
  </header>

  <div id="messages">
    <div class="welcome" id="welcome">
      <div class="welcome-icon">🎓</div>
      <h2>논문 작성을 도와드릴게요</h2>
      <p>학술 논문 검색, 인용 검증, 내용 요약,<br>초안 작성까지 지원합니다.</p>
      <div class="suggestions">
        <button class="suggestion-btn">🔍 transformer attention mechanism 관련 최신 논문 찾아줘</button>
        <button class="suggestion-btn">✅ DOI 10.48550/arXiv.1706.03762 인용 정보 검증해줘</button>
        <button class="suggestion-btn">✍️ 딥러닝 기반 자연어처리 서론 초안 작성 도와줘</button>
        <button class="suggestion-btn">📝 이 논문의 핵심 기여와 방법론을 요약해줘</button>
      </div>
    </div>
  </div>

  <div id="input-area">
    <div class="input-row">
      <textarea id="user-input" placeholder="메시지를 입력하세요…" rows="1"></textarea>
      <button id="send-btn" aria-label="전송">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M22 2L11 13"/><path d="M22 2L15 22 11 13 2 9z"/>
        </svg>
      </button>
    </div>
  </div>
</div>

<script>
(function () {
  const SESSION_KEY = 'paper_bot_session';
  let sessionId = localStorage.getItem(SESSION_KEY) || crypto.randomUUID();
  localStorage.setItem(SESSION_KEY, sessionId);

  const messagesEl = document.getElementById('messages');
  const welcomeEl = document.getElementById('welcome');
  const inputEl = document.getElementById('user-input');
  const sendBtn = document.getElementById('send-btn');
  const newBtn = document.getElementById('new-btn');

  let isStreaming = false;
  let currentBotBubble = null;
  let currentBotText = '';
  let thinkingEl = null;

  // Auto-resize textarea
  inputEl.addEventListener('input', () => {
    inputEl.style.height = 'auto';
    inputEl.style.height = Math.min(inputEl.scrollHeight, 140) + 'px';
  });

  // Send on Enter (not Shift+Enter)
  inputEl.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  sendBtn.addEventListener('click', sendMessage);

  newBtn.addEventListener('click', async () => {
    if (isStreaming) return;
    await fetch(`/api/session/${sessionId}`, { method: 'DELETE' });
    sessionId = crypto.randomUUID();
    localStorage.setItem(SESSION_KEY, sessionId);
    messagesEl.innerHTML = '';
    messagesEl.appendChild(welcomeEl);
    welcomeEl.style.display = '';
  });

  // Suggestion buttons
  document.querySelectorAll('.suggestion-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      inputEl.value = btn.textContent.replace(/^[🔍✅✍️📝]\s*/, '');
      inputEl.dispatchEvent(new Event('input'));
      sendMessage();
    });
  });

  function now() {
    return new Date().toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' });
  }

  function appendUserMessage(text) {
    welcomeEl.style.display = 'none';
    const msg = document.createElement('div');
    msg.className = 'msg user';
    msg.innerHTML = `<div class="bubble">${escHtml(text)}</div><span class="msg-time">${now()}</span>`;
    messagesEl.appendChild(msg);
    scrollToBottom();
  }

  function createBotMessage() {
    const msg = document.createElement('div');
    msg.className = 'msg bot';
    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    msg.appendChild(bubble);
    messagesEl.appendChild(msg);
    currentBotBubble = bubble;
    currentBotText = '';
    scrollToBottom();
    return msg;
  }

  function finalizeBotMessage(msgEl) {
    if (!currentBotBubble) return;
    const time = document.createElement('span');
    time.className = 'msg-time';
    time.textContent = now();

    const copyBtn = document.createElement('button');
    copyBtn.className = 'copy-btn';
    copyBtn.textContent = '복사';
    copyBtn.addEventListener('click', () => {
      navigator.clipboard.writeText(currentBotText).then(() => {
        copyBtn.textContent = '복사됨 ✓';
        setTimeout(() => { copyBtn.textContent = '복사'; }, 1500);
      });
    });

    const row = document.createElement('div');
    row.style.cssText = 'display:flex;gap:6px;align-items:center;';
    row.appendChild(time);
    row.appendChild(copyBtn);
    msgEl.appendChild(row);
    currentBotBubble = null;
  }

  function appendThinking(label) {
    removeThinking();
    thinkingEl = document.createElement('div');
    thinkingEl.className = 'thinking';
    thinkingEl.innerHTML = `${escHtml(label)}<div class="dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>`;
    messagesEl.appendChild(thinkingEl);
    scrollToBottom();
  }

  function removeThinking() {
    if (thinkingEl) { thinkingEl.remove(); thinkingEl = null; }
  }

  const TOOL_LABELS = {
    search_papers: '논문 검색 (Semantic Scholar)',
    search_arxiv: 'arXiv 검색',
    verify_citation: '인용 검증 (CrossRef)',
    get_paper_details: '논문 상세 조회',
  };

  function appendToolCall(name, args) {
    const label = TOOL_LABELS[name] || name;
    const argsStr = Object.entries(args).map(([k, v]) => `${k}: ${JSON.stringify(v)}`).join(', ');
    const el = document.createElement('div');
    el.className = 'tool-call';
    el.dataset.tool = name;
    el.innerHTML = `
      <div class="tool-summary">
        <span class="tool-icon">🔧</span>
        <span class="tool-name">${escHtml(label)}</span>
        <span class="tool-status running">실행 중</span>
      </div>
      <div class="tool-args">${escHtml(argsStr)}</div>`;
    el.querySelector('.tool-summary').addEventListener('click', () => el.classList.toggle('open'));
    messagesEl.appendChild(el);
    scrollToBottom();
    return el;
  }

  // Track last tool element per tool name
  const pendingTools = {};

  function handleEvent(ev) {
    switch (ev.type) {
      case 'text':
        if (!currentBotBubble) createBotMessage();
        currentBotText += ev.content;
        currentBotBubble.textContent = currentBotText;
        scrollToBottom();
        break;

      case 'tool_start':
        removeThinking();
        pendingTools[ev.name] = appendToolCall(ev.name, ev.args || {});
        break;

      case 'tool_end': {
        const el = pendingTools[ev.name];
        if (el) {
          const statusEl = el.querySelector('.tool-status');
          statusEl.textContent = ev.status === 'ok' ? '완료' : '오류';
          statusEl.className = `tool-status ${ev.status === 'ok' ? 'ok' : 'error'}`;
          delete pendingTools[ev.name];
        }
        break;
      }

      case 'thinking':
        appendThinking('분석 중…');
        break;

      case 'done':
        removeThinking();
        break;

      case 'error':
        removeThinking();
        if (!currentBotBubble) createBotMessage();
        currentBotText += `\n\n⚠️ 오류: ${ev.message}`;
        currentBotBubble.textContent = currentBotText;
        scrollToBottom();
        break;
    }
  }

  async function sendMessage() {
    const text = inputEl.value.trim();
    if (!text || isStreaming) return;

    isStreaming = true;
    sendBtn.disabled = true;
    inputEl.value = '';
    inputEl.style.height = 'auto';

    appendUserMessage(text);
    appendThinking('응답 생성 중…');

    try {
      const res = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ session_id: sessionId, message: text }),
      });

      if (!res.ok) {
        const err = await res.json().catch(() => ({ detail: res.statusText }));
        removeThinking();
        if (!currentBotBubble) createBotMessage();
        currentBotText = `⚠️ 오류: ${err.detail || res.statusText}`;
        currentBotBubble.textContent = currentBotText;
        return;
      }

      removeThinking();
      const botMsgEl = createBotMessage();

      const reader = res.body.getReader();
      const decoder = new TextDecoder();
      let buf = '';

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        buf += decoder.decode(value, { stream: true });
        const lines = buf.split('\n');
        buf = lines.pop(); // keep incomplete line
        for (const line of lines) {
          if (line.startsWith('data: ')) {
            try {
              const ev = JSON.parse(line.slice(6));
              handleEvent(ev);
            } catch {}
          }
        }
      }
      // Process any remaining buffer
      if (buf.startsWith('data: ')) {
        try { handleEvent(JSON.parse(buf.slice(6))); } catch {}
      }

      finalizeBotMessage(botMsgEl);

    } catch (err) {
      removeThinking();
      if (!currentBotBubble) createBotMessage();
      currentBotText = `⚠️ 네트워크 오류: ${err.message}`;
      currentBotBubble.textContent = currentBotText;
    } finally {
      isStreaming = false;
      sendBtn.disabled = false;
      inputEl.focus();
      scrollToBottom();
    }
  }

  function scrollToBottom() {
    messagesEl.scrollTo({ top: messagesEl.scrollHeight, behavior: 'smooth' });
  }

  function escHtml(str) {
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }
})();
</script>
</body>
</html>
